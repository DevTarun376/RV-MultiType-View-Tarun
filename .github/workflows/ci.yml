name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  build-library:
    name: Build Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build library release AAR
        run: ./gradlew :recyclerview-multitype-view:assembleRelease --no-daemon

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: library-aar
          path: recyclerview-multitype-view/build/outputs/aar/recyclerview-multitype-view-release.aar
          retention-days: 7

  build-demo:
    name: Build Demo App
    runs-on: ubuntu-latest
    needs: build-library

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build demo app debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: demo-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
